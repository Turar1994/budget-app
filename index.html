<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Бюджет</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#FDF8F2;height:100%;overscroll-behavior:none}
:root{
  --bg:#FDF8F2;--bg2:#FFFFFF;--bg3:#F5EFE6;--bg4:#EDE3D6;
  --border:rgba(180,140,90,0.15);--border2:rgba(180,140,90,0.28);
  --text:#2D1F0E;--text2:#7A6348;--text3:#B09878;
  --gold:#C8963C;--gold2:#E8B45A;--gold-bg:rgba(200,150,60,0.08);
  --green:#2E7D52;--green-bg:rgba(46,125,82,0.1);--green-border:rgba(46,125,82,0.25);
  --yellow:#B45309;--yellow-bg:rgba(180,83,9,0.1);--yellow-border:rgba(180,83,9,0.25);
  --red:#B91C1C;--red-bg:rgba(185,28,28,0.1);--red-border:rgba(185,28,28,0.25);
  --shadow:0 2px 16px rgba(180,140,90,0.1);
  --sb:env(safe-area-inset-bottom,0px)
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(72px + var(--sb))}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--gold)}
.topbar-sub{font-size:11px;color:var(--text3);font-weight:600;margin-top:1px}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);font-weight:700}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:var(--sb);box-shadow:0 -2px 16px rgba(180,140,90,0.08)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:10px 4px;min-height:60px;transition:color .2s;position:relative}
.bnav-btn.active{color:var(--gold)}
.bnav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--gold);border-radius:0 0 3px 3px}
.bnav-icon{font-size:21px;line-height:1}
.bnav-label{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:800}
.page{display:none}.page.active{display:block}
.content{padding:18px 16px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#C8963C 0%,#8B6520 100%);border-radius:20px;padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(200,150,60,0.35)}
.hero-deco{position:absolute;right:-8px;top:-8px;opacity:.12;font-size:90px;line-height:1;user-select:none;font-family:'Playfair Display',serif}
.hero-label{font-size:11px;font-weight:800;color:rgba(255,255,255,.65);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:4px}
.hero-sub{font-size:12px;color:rgba(255,255,255,.65);font-weight:600}
.hero-bar{height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden;margin-top:14px}
.hero-bar-fill{height:100%;border-radius:3px;background:rgba(255,255,255,.85);transition:width .5s}
.hero-bar-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:rgba(255,255,255,.65);font-weight:600}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 10px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:9px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.day-box{border-radius:16px;padding:16px 18px;margin-bottom:14px;border:1.5px solid var(--border);background:var(--bg2);box-shadow:var(--shadow)}
.day-box.green{border-color:var(--green-border);background:var(--green-bg)}
.day-box.yellow{border-color:var(--yellow-border);background:var(--yellow-bg)}
.day-box.red{border-color:var(--red-border);background:var(--red-bg)}
.day-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.day-amount{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:3px}
.day-box.green .day-amount{color:var(--green)}
.day-box.yellow .day-amount{color:var(--yellow)}
.day-box.red .day-amount{color:var(--red)}
.day-box:not(.green):not(.yellow):not(.red) .day-amount{color:var(--gold)}
.day-sub{font-size:12px;color:var(--text2);font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.feedback{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.feedback.green{background:var(--green-bg);border:1.5px solid var(--green-border);color:var(--green)}
.feedback.yellow{background:var(--yellow-bg);border:1.5px solid var(--yellow-border);color:var(--yellow)}
.feedback.red{background:var(--red-bg);border:1.5px solid var(--red-border);color:var(--red)}
.qadd{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.qadd-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.input-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px;align-items:stretch}
.amt-wrap{position:relative}
.amt-input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:14px 48px 14px 16px;font-size:22px;font-family:'Playfair Display',serif;font-weight:700;color:var(--text);outline:none;transition:border-color .2s}
.amt-input:focus{border-color:var(--gold)}
.amt-input::placeholder{color:var(--text3)}
.amt-sym{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);font-weight:700}
.date-pick{background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:0 12px;font-size:13px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:border-color .2s;height:100%;min-width:110px}
.date-pick:focus{border-color:var(--gold)}
.note-inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:500;outline:none;transition:border-color .2s;margin-bottom:12px}
.note-inp:focus{border-color:var(--gold)}
.note-inp::placeholder{color:var(--text3)}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:7px 12px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.cat-btn.active{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}
.add-btn{width:100%;padding:14px;background:linear-gradient(135deg,#C8963C,#8B6520);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px rgba(200,150,60,0.35);transition:opacity .15s}
.add-btn:active{opacity:.85}
.exp-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border-bottom:none}
.exp-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--bg3)}
.exp-info{flex:1;min-width:0}
.exp-note{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}
.exp-amt{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--red);flex-shrink:0}
.exp-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;font-size:16px;opacity:0;transition:opacity .2s}
.exp-item:hover .exp-del{opacity:1}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;font-weight:700;flex-shrink:0}
.cal-month{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:800;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.cal-day.empty{cursor:default}
.cal-day.today{border-color:var(--gold)}
.cal-day.green{background:var(--green-bg);border-color:var(--green-border)}
.cal-day.yellow{background:var(--yellow-bg);border-color:var(--yellow-border)}
.cal-day.red{background:var(--red-bg);border-color:var(--red-border)}
.cal-day.future{background:var(--bg3);opacity:.4;cursor:default}
.cal-day.no-data{background:var(--bg3)}
.cal-num{font-size:13px;font-weight:700;color:var(--text)}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px}
.cal-day.green .cal-dot{background:var(--green)}
.cal-day.yellow .cal-dot{background:var(--yellow)}
.cal-day.red .cal-dot{background:var(--red)}
.sav-hero{border-radius:20px;padding:24px 20px;margin-bottom:16px;text-align:center;background:linear-gradient(135deg,#166534,#14532D);box-shadow:0 6px 24px rgba(46,125,82,0.25);position:relative;overflow:hidden}
.sav-amount{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#fff;margin:10px 0 4px}
.sav-lbl{font-size:11px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px;font-weight:800}
.set-group{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.set-item{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.set-item:last-child{border-bottom:none}
.set-item:hover{background:var(--bg3)}
.set-label{font-size:14px;font-weight:700;color:var(--text)}
.set-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}
.set-val{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold)}
.modal-overlay{position:fixed;inset:0;background:rgba(45,31,14,.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--sb));box-shadow:0 -8px 40px rgba(180,140,90,0.2)}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:20px;color:var(--text)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.fg input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:16px;padding:12px 14px;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--gold)}
.mbtn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:8px}
.mbtn-p{background:linear-gradient(135deg,#C8963C,#8B6520);color:#fff;box-shadow:0 4px 14px rgba(200,150,60,0.35)}
.mbtn-s{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border2)}
.empty{text-align:center;padding:36px 20px}
.empty-icon{font-size:32px;opacity:.25;margin-bottom:10px}
.empty-text{font-size:13px;color:var(--text3);font-weight:600}
.btn-row{display:flex;gap:8px}
.bsm{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Nunito',sans-serif}
.bsm-p{background:linear-gradient(135deg,#C8963C,#8B6520);color:#fff;box-shadow:0 3px 10px rgba(200,150,60,0.3)}
.bsm-g{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border2)}
.divider{height:1px;background:var(--border);margin:16px 0}
.sec-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <!-- Kazakh ornament logo SVG -->
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" style="flex-shrink:0">
      <rect width="38" height="38" rx="11" fill="#FDF0E0"/>

<nav class="bnav">
  <button class="bnav-btn active" onclick="goTo('home')" id="nav-home"><span class="bnav-icon">🏠</span><span class="bnav-label">Басты</span></button>
  <button class="bnav-btn" onclick="goTo('calendar')" id="nav-calendar"><span class="bnav-icon">📅</span><span class="bnav-label">Күнтізбе</span></button>

  <div class="modal" id="modal-content"></div>
</div>

<script>
const SUPA_URL='https://tcpvxvgexmsazmzcihjy.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjcHZ4dmdleG1zYXptemNpaGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIyNDIsImV4cCI6MjA5MDY5ODI0Mn0.2yZ1GWtcWHamgbkfXnOpag8P60JmP6TgOvUAto7VuJ8';
const H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
async function sbGet(t,q=''){const r=await fetch(SUPA_URL+'/rest/v1/'+t+'?select=*'+q,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbInsert(t,d){const r=await fetch(SUPA_URL+'/rest/v1/'+t,{method:'POST',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbUpdate(t,id,d){const r=await fetch(SUPA_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());}
async function sbDelete(t,id){const r=await fetch(SUPA_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}

let budget=null,expenses=[],savings=[],currentTab='home',selCat='food',selDate=today(),calMon=new Date();
calMon.setDate(1);

const CATS=[
  {id:'food',icon:'🍔',label:'Тамақ'},{id:'taxi',icon:'🚕',label:'Такси'},
  {id:'cafe',icon:'☕',label:'Кафе'},{id:'shop',icon:'🛍',label:'Дүкен'},
  {id:'health',icon:'💊',label:'Дәрі'},{id:'fun',icon:'🎮',label:'Ойын'},
  {id:'other',icon:'📦',label:'Басқа'},
];
function cat(id){return CATS.find(c=>c.id===id)||CATS[6];}
function fmt(n){return Math.round(n).toLocaleString('ru');}
function today(){return new Date().toISOString().slice(0,10);}
function monthKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function daysLeft(){const n=new Date(),l=new Date(n.getFullYear(),n.getMonth()+1,0);return l.getDate()-n.getDate()+1;}
function totalDays(){const n=new Date();return daysInMonth(n.getFullYear(),n.getMonth());}
function setSS(ok){
  const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');
  if(d)d.className='sync-dot'+(ok?' ok':'');
  if(l)l.textContent=ok?'Синхрондалды':'Офлайн';
}
function spentMonth(){const m=monthKey();return expenses.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+Number(e.amount),0);}
function spentOn(ds){return expenses.filter(e=>e.date===ds).reduce((s,e)=>s+Number(e.amount),0);}
function totalSav(){return savings.reduce((s,v)=>s+Number(v.amount),0);}
function dailyLim(){if(!budget)return 0;const rem=Number(budget.total_amount)-spentMonth(),d=daysLeft();return d>0?rem/d:0;}
function baseLim(){return budget?Number(budget.total_amount)/totalDays():0;}
function dayStatus(spent,lim){
  if(spent===0&&lim===0)return 'no-data';
  const r=spent/lim;if(r>=1)return 'red';if(r>=0.8)return 'yellow';return 'green';
}
function feedback(){
  const lim=dailyLim(),sp=spentOn(today());
  if(!budget)return null;
  if(sp===0)return{type:'green',msg:'🌅 Бүгін әлі шығын жоқ. Жақсы күн болсын!'};
  if(sp>lim)return{type:'red',msg:'⚠️ Күндік лимиттен асып кеттіңіз. Ертең бюджет азаяды.'};
  if(sp/lim>=0.8)return{type:'yellow',msg:'⚡ Күндік лимитке жақындап қалдыңыз.'};
  return{type:'green',msg:'✅ Бюджет аясында жүрсіз. Тамаша!'};
}

function goTo(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  render();
}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
function showModal(h){
  document.getElementById('modal-content').innerHTML='<div class="modal-handle"></div>'+h;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function render(){
  const n=new Date(),ms=['Қаңтар','Ақпан','Наурыз','Сәуір','Мамыр','Маусым','Шілде','Тамыз','Қыркүйек','Қазан','Қараша','Желтоқсан'];
  document.getElementById('topbar-month').textContent=ms[n.getMonth()]+' '+n.getFullYear();
  if(currentTab==='home')renderHome();
  else if(currentTab==='calendar')renderCalendar();
  else if(currentTab==='savings')renderSavings();
  else renderSettings();
}

function renderHome(){
  const lim=dailyLim(),spT=spentOn(today()),spM=spentMonth();
  const tot=budget?Number(budget.total_amount):0,rem=tot-spM;
  const prog=tot>0?Math.min(spM/tot*100,100):0;
  const st=dayStatus(spT,lim),fb=feedback();
  const tExp=expenses.filter(e=>e.date===today()).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  if(!budget){
    document.getElementById('page-home').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <svg width="64" height="64" viewBox="0 0 64 64" style="margin:0 auto 16px;display:block">
        <path d="M32 6L37 18L50 15L46 28L58 32L46 36L50 49L37 46L32 58L27 46L14 49L18 36L6 32L18 28L14 15L27 18Z" fill="none" stroke="#C8963C" stroke-width="1.5"/>
        <circle cx="32" cy="32" r="8" fill="#C8963C" opacity=".25"/>
        <circle cx="32" cy="32" r="4" fill="#C8963C"/>
      </svg>
      <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:8px">Бюджетті орнатыңыз</div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:28px;font-weight:600;line-height:1.6">Ай сайынғы бюджетті енгізіп,<br/>күнделікті шығындарды бақылаңыз</div>
      <button class="add-btn" style="max-width:220px;margin:0 auto;display:block" onclick="openBudgetModal()">✦ Бюджет орнату</button>
    </div>`;
    return;
  }

  let h=`<div class="hero">
    <div class="hero-deco">✦</div>
    <div class="hero-label">Ай бюджеті</div>
    <div class="hero-amount">${fmt(tot)} ₸</div>
    <div class="hero-sub">Қалған: ${fmt(rem)} ₸ · ${daysLeft()} күн</div>
    <div class="hero-bar"><div class="hero-bar-fill" style="width:${prog}%"></div></div>
    <div class="hero-bar-labels"><span>Жұмсалды: ${fmt(spM)} ₸</span><span>${Math.round(prog)}%</span></div>
  </div>`;

  if(fb) h+=`<div class="feedback ${fb.type}">${fb.msg}</div>`;

  h+=`<div class="day-box ${st}">
    <div class="day-label">Бүгінгі лимит</div>
    <div class="day-amount">${fmt(lim)} ₸</div>
    <div class="day-sub">Бүгін: ${fmt(spT)} ₸${spT>lim?' · <b style="color:var(--red)">Асып кетті!</b>':''}</div>
  </div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${fmt(spT)}</div><div class="stat-lbl">Бүгін ₸</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--gold)">${fmt(lim)}</div><div class="stat-lbl">Лимит ₸</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${fmt(Math.max(0,lim-spT))}</div><div class="stat-lbl">Қалды ₸</div></div>
  </div>`;

  const cH=CATS.map(c=>`<button class="cat-btn ${selCat===c.id?'active':''}" onclick="selCat='${c.id}';renderHome()">${c.icon} ${c.label}</button>`).join('');
  h+=`<div class="qadd">
    <div class="qadd-title">Шығын қосу</div>
    <div class="input-row">
      <div class="amt-wrap">
        <input class="amt-input" id="eamt" type="number" inputmode="numeric" placeholder="0"/>
        <span class="amt-sym">₸</span>
      </div>
      <input class="date-pick" id="edate" type="date" value="${selDate}" onchange="selDate=this.value"/>
    </div>
    <input class="note-inp" id="enote" placeholder="Не үшін? (міндетті емес)"/>
    <div class="cats">${cH}</div>
    <button class="add-btn" onclick="addExp()">➕ Қосу</button>
  </div>
  <div class="card"><div class="card-title">Бүгінгі шығындар</div>`;

  if(!tExp.length){
    h+=`<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">Бүгін шығын жоқ</div></div>`;
  } else {
    tExp.forEach(e=>{
      const c=cat(e.category);
      h+=`<div class="exp-item">
        <div class="exp-icon">${c.icon}</div>
        <div class="exp-info">
          <div class="exp-note">${e.note||c.label}</div>
          <div class="exp-meta">${c.label} · ${new Date(e.created_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="exp-amt">-${fmt(e.amount)} ₸</div>
        <button class="exp-del" onclick="delExp('${e.id}')">🗑</button>
      </div>`;
    });
  }
  h+=`</div>`;
  document.getElementById('page-home').innerHTML=h;
}

function renderCalendar(){
  const y=calMon.getFullYear(),m=calMon.getMonth();
  const ms=['Қаңтар','Ақпан','Наурыз','Сәуір','Мамыр','Маусым','Шілде','Тамыз','Қыркүйек','Қазан','Қараша','Желтоқсан'];
  const days=daysInMonth(y,m),offset=(new Date(y,m,1).getDay()+6)%7,base=baseLim(),tod=today();

  let h=`<div class="cal-hdr">
    <button class="cal-nav" onclick="calMon.setMonth(calMon.getMonth()-1);renderCalendar()">‹</button>
    <div class="cal-month">${ms[m]} ${y}</div>
    <button class="cal-nav" onclick="calMon.setMonth(calMon.getMonth()+1);renderCalendar()">›</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow">Дс</div><div class="cal-dow">Сс</div><div class="cal-dow">Ср</div>
    <div class="cal-dow">Бс</div><div class="cal-dow">Жм</div><div class="cal-dow">Сб</div><div class="cal-dow">Жк</div>`;

  for(let i=0;i<offset;i++) h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const fut=ds>tod,isT=ds===tod,sp=spentOn(ds);
    let cls=fut?'future':(sp===0?'no-data':dayStatus(sp,base));
    if(isT)cls+=' today';
    h+=`<div class="cal-day ${cls}" onclick="${fut?'':'showDay(\''+ds+'\')'}">
      <span class="cal-num">${d}</span>
      ${!fut&&sp>0?`<span class="cal-dot"></span>`:''}
    </div>`;
  }
  h+=`</div>
  <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:700"><div style="width:10px;height:10px;border-radius:3px;background:var(--green-bg);border:1px solid var(--green-border)"></div>Аз</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:700"><div style="width:10px;height:10px;border-radius:3px;background:var(--yellow-bg);border:1px solid var(--yellow-border)"></div>Жақын</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-weight:700"><div style="width:10px;height:10px;border-radius:3px;background:var(--red-bg);border:1px solid var(--red-border)"></div>Асып кетті</div>
  </div>`;

  const mk=`${y}-${String(m+1).padStart(2,'0')}`;
  const mE=expenses.filter(e=>e.date.startsWith(mk));
  const mT=mE.reduce((s,e)=>s+Number(e.amount),0);
  const cTot={};mE.forEach(e=>{cTot[e.category]=(cTot[e.category]||0)+Number(e.amount);});
  const topC=Object.entries(cTot).sort((a,b)=>b[1]-a[1]).slice(0,5);

  h+=`<div class="card" style="margin-top:16px"><div class="card-title">Ай қорытындысы</div>
    <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:14px;font-weight:700">
      <span style="color:var(--text2)">Барлық шығын</span>
      <span style="color:var(--red);font-family:'Playfair Display',serif;font-size:17px">${fmt(mT)} ₸</span>
    </div>`;
  if(topC.length){const mx=topC[0][1];topC.forEach(([id,v])=>{const c=cat(id);h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;font-weight:700"><span style="color:var(--text2)">${c.icon} ${c.label}</span><span style="color:var(--text3)">${fmt(v)} ₸</span></div><div style="height:5px;background:var(--bg3);border-radius:3px"><div style="height:100%;width:${Math.round(v/mx*100)}%;background:var(--gold);border-radius:3px"></div></div></div>`;}); }
  h+=`</div>`;
  document.getElementById('page-calendar').innerHTML=h;
}

function renderSavings(){
  const tot=totalSav();
  const rS=[...savings].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,20);
  let h=`<div class="sav-hero">
    <svg width="44" height="44" viewBox="0 0 44 44" style="margin:0 auto 8px;display:block;opacity:.4">
      <path d="M22 4L25.5 12.5L34.5 10.5L32 19L40 22L32 25L34.5 33.5L25.5 31.5L22 40L18.5 31.5L9.5 33.5L12 25L4 22L12 19L9.5 10.5L18.5 12.5Z" fill="none" stroke="white" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="6" fill="white" opacity=".7"/>
    </svg>
    <div class="sav-lbl">Жинақ қоры</div>
    <div class="sav-amount">${fmt(tot)} ₸</div>
    <div style="font-size:12px;color:rgba(255,255,255,.5);font-weight:700">${savings.length} жазба</div>
  </div>
  <div class="btn-row" style="margin-bottom:14px">
    <button class="bsm bsm-p" style="flex:1" onclick="openSavModal()">➕ Жинаққа қосу</button>
    <button class="bsm bsm-g" style="flex:1" onclick="openWithModal()">↩ Алу</button>
  </div>
  <div class="card"><div class="card-title">Тарих</div>`;
  if(!rS.length){h+=`<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">Жинақ жоқ</div></div>`;}
  else rS.forEach(s=>{
    const iW=s.amount<0;
    h+=`<div class="exp-item">
      <div class="exp-icon">${iW?'↩':'✦'}</div>
      <div class="exp-info"><div class="exp-note">${s.note||(iW?'Алынды':'Жинақталды')}</div><div class="exp-meta">${new Date(s.date+'T00:00:00').toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'})}</div></div>
      <div class="exp-amt" style="color:${iW?'var(--red)':'var(--green)'}">${iW?'':'+'}${fmt(s.amount)} ₸</div>
      <button class="exp-del" onclick="delSav('${s.id}')">🗑</button>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('page-savings').innerHTML=h;
}

function renderSettings(){
  const tot=budget?Number(budget.total_amount):0;
  document.getElementById('page-settings').innerHTML=`
  <h2 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px">Баптаулар</h2>
  <div class="set-group">
    <div class="set-item" onclick="openBudgetModal()"><div><div class="set-label">Ай бюджеті</div><div class="set-sub">Ағымдағы ай</div></div><div class="set-val">${fmt(tot)} ₸</div></div>
    <div class="set-item"><div><div class="set-label">Күнделікті лимит</div><div class="set-sub">Базалық мән</div></div><div class="set-val">${fmt(baseLim())} ₸</div></div>
    <div class="set-item"><div><div class="set-label">Қалған күндер</div><div class="set-sub">Ай соңына дейін</div></div><div class="set-val">${daysLeft()} күн</div></div>
  </div>
  <button class="add-btn" onclick="openBudgetModal()">✏️ Бюджетті өзгерту</button>
  <div class="divider"></div>
  <div class="sec-title">Деректер</div>
  <div class="set-group">
    <div class="set-item" onclick="exportData()"><div><div class="set-label">Деректерді жүктеу</div><div class="set-sub">JSON форматында</div></div><span style="color:var(--text3)">›</span></div>
    <div class="set-item" onclick="if(confirm('Барлық деректерді өшіресіз бе?'))clearAll()"><div><div class="set-label" style="color:var(--red)">Барлығын тазалау</div><div class="set-sub">Қайтарылмайды!</div></div><span style="color:var(--text3)">›</span></div>
  </div>`;
}

function openBudgetModal(){
  const c=budget?Number(budget.total_amount):'';
  showModal(`<div class="modal-title">Ай бюджетін орнату</div>
  <div class="fg"><label>Сомасы (₸)</label><input id="b-inp" type="number" inputmode="numeric" placeholder="150000" value="${c}" style="font-size:22px;font-family:'Playfair Display',serif;font-weight:700"/></div>
  <p style="font-size:12px;color:var(--text3);margin-bottom:4px;font-weight:600">Күнделікті лимит автоматты есептеледі</p>
  <button class="mbtn mbtn-p" onclick="saveBudget()">💾 Сақтау</button>
  <button class="mbtn mbtn-s" onclick="closeModal()">Болдырмау</button>`);
}
async function saveBudget(){
  const v=parseFloat(document.getElementById('b-inp').value);
  if(!v||v<=0)return alert('Сомасын енгізіңіз');
  try{
    if(budget){await sbUpdate('budgets',budget.id,{total_amount:v});budget.total_amount=v;}
    else{const r=await sbInsert('budgets',{month:monthKey(),total_amount:v});budget=r[0];}
    setSS(true);closeModal();render();
  }catch(e){setSS(false);alert('Қате: '+e.message);}
}
function openSavModal(){
  showModal(`<div class="modal-title">Жинаққа қосу</div>
  <div class="fg"><label>Сомасы (₸)</label><input id="s-amt" type="number" inputmode="numeric" placeholder="10000" style="font-size:20px"/></div>
  <div class="fg"><label>Ескертпе</label><input id="s-note" type="text" placeholder="Мысалы: Ноутбукке"/></div>
  <button class="mbtn mbtn-p" onclick="addSav(1)">✦ Жинаққа салу</button>
  <button class="mbtn mbtn-s" onclick="closeModal()">Болдырмау</button>`);
}
function openWithModal(){
  showModal(`<div class="modal-title">Жинақтан алу</div>
  <div class="fg"><label>Сомасы (₸)</label><input id="s-amt" type="number" inputmode="numeric" placeholder="5000" style="font-size:20px"/></div>
  <div class="fg"><label>Ескертпе</label><input id="s-note" type="text" placeholder="Не үшін алынды"/></div>
  <button class="mbtn" style="background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-border);width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;font-family:'Nunito',sans-serif" onclick="addSav(-1)">↩ Алу</button>
  <button class="mbtn mbtn-s" onclick="closeModal()">Болдырмау</button>`);
}
async function addSav(sign){
  const a=parseFloat(document.getElementById('s-amt').value),n=document.getElementById('s-note').value;
  if(!a||a<=0)return alert('Сомасын енгізіңіз');
  try{const r=await sbInsert('savings',{amount:a*sign,note:n,date:today()});savings.push(r[0]);setSS(true);closeModal();render();}
  catch(e){setSS(false);alert('Қате: '+e.message);}
}
function showDay(ds){
  const dE=expenses.filter(e=>e.date===ds).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const tot=dE.reduce((s,e)=>s+Number(e.amount),0);
  const d=new Date(ds+'T00:00:00'),dl=d.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});
  const st=dayStatus(tot,baseLim()),sc={'green':'var(--green)','yellow':'var(--yellow)','red':'var(--red)','no-data':'var(--text3)'};
  const eH=dE.length?dE.map(e=>{const c=cat(e.category);return`<div class="exp-item"><div class="exp-icon">${c.icon}</div><div class="exp-info"><div class="exp-note">${e.note||c.label}</div><div class="exp-meta">${c.label}</div></div><div class="exp-amt">-${fmt(e.amount)} ₸</div></div>`;}).join(''):`<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">Бұл күні шығын жоқ</div></div>`;
  showModal(`<div class="modal-title">${dl}</div>
  <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:12px;padding:14px 16px;margin-bottom:16px">
    <span style="color:var(--text2);font-size:13px;font-weight:700">Барлық шығын</span>
    <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:${sc[st]||'var(--text)'}">${fmt(tot)} ₸</span>
  </div>${eH}
  <button class="mbtn mbtn-s" style="margin-top:12px" onclick="closeModal()">Жабу</button>`);
}
async function addExp(){
  const a=parseFloat(document.getElementById('eamt').value);
  if(!a||a<=0){document.getElementById('eamt').focus();return;}
  const n=document.getElementById('enote').value.trim(),d=document.getElementById('edate').value||today();
  try{
    const r=await sbInsert('expenses',{amount:a,category:selCat,note:n,date:d});
    expenses.push(r[0]);
    document.getElementById('eamt').value='';document.getElementById('enote').value='';
    setSS(true);render();
  }catch(e){setSS(false);alert('Қате: '+e.message);}
}
async function delExp(id){
  if(!confirm('Жойылсын ба?'))return;
  try{await sbDelete('expenses',id);expenses=expenses.filter(e=>e.id!==id);setSS(true);render();}
  catch(e){setSS(false);}
}
async function delSav(id){
  if(!confirm('Жойылсын ба?'))return;
  try{await sbDelete('savings',id);savings=savings.filter(s=>s.id!==id);setSS(true);render();}
  catch(e){setSS(false);}
}
function exportData(){
  const blob=new Blob([JSON.stringify({budget,expenses,savings,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='budget-'+today()+'.json';a.click();
}
async function clearAll(){
  try{for(const e of expenses)await sbDelete('expenses',e.id);for(const s of savings)await sbDelete('savings',s.id);expenses=[];savings=[];setSS(true);render();}
  catch(e){setSS(false);}
}
async function init(){
  setSS(false);
  try{
    const m=monthKey();
    const[b,e,s]=await Promise.all([sbGet('budgets','&month=eq.'+m),sbGet('expenses','&order=created_at.desc'),sbGet('savings','&order=created_at.desc')]);
    budget=b[0]||null;expenses=e;savings=s;setSS(true);
  }catch(e){setSS(false);console.error(e);}
  render();
}
init();
</script>
</body>
</html>
