<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Бюджет</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0D0F14;height:100%;overscroll-behavior:none}
:root{
  --bg:#0D0F14;--bg2:#13161E;--bg3:#1A1E28;--bg4:#222736;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#F0F2F8;--text2:#8B92A8;--text3:#4A5068;
  --green:#22C55E;--green-bg:rgba(34,197,94,0.1);--green-border:rgba(34,197,94,0.25);
  --yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.1);--yellow-border:rgba(245,158,11,0.25);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.1);--red-border:rgba(239,68,68,0.25);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.1);
  --accent:#6366F1;--accent2:#818CF8;
  --sb:env(safe-area-inset-bottom,0px)
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(72px + var(--sb))}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--red);transition:background .3s}
.sync-dot.ok{background:var(--green)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:var(--sb)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:10px 4px;min-height:58px;transition:color .2s;position:relative}
.bnav-btn.active{color:var(--accent2)}
.bnav-btn.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.bnav-icon{font-size:20px;line-height:1}
.bnav-label{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}

/* PAGES */
.page{display:none}.page.active{display:block}
.content{padding:20px 16px;max-width:480px;margin:0 auto}

/* BUDGET HERO */
.hero{background:linear-gradient(135deg,var(--accent) 0%,#4F46E5 100%);border-radius:20px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06)}
.hero::after{content:'';position:absolute;bottom:-20px;left:40px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.04)}
.hero-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.6);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-family:'Unbounded',sans-serif;font-size:32px;font-weight:700;color:#fff;line-height:1;margin-bottom:4px}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.6)}
.hero-progress{margin-top:16px}
.progress-track{height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#fff;transition:width .5s}
.progress-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:rgba(255,255,255,0.6)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* STAT ROW */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg3);border-radius:12px;padding:14px 12px;text-align:center}
.stat-val{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;color:var(--text);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:10px;color:var(--text3);font-weight:500}

/* DAILY LIMIT BOX */
.day-box{background:var(--bg3);border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid var(--border)}
.day-box.green{border-color:var(--green-border);background:var(--green-bg)}
.day-box.yellow{border-color:var(--yellow-border);background:var(--yellow-bg)}
.day-box.red{border-color:var(--red-border);background:var(--red-bg)}
.day-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.day-amount{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.day-box.green .day-amount{color:var(--green)}
.day-box.yellow .day-amount{color:var(--yellow)}
.day-box.red .day-amount{color:var(--red)}
.day-sub{font-size:12px;color:var(--text2)}

/* QUICK ADD */
.quick-add{background:var(--bg3);border-radius:16px;padding:16px;margin-bottom:16px}
.quick-add-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.amount-input-wrap{position:relative;margin-bottom:12px}
.amount-input{width:100%;background:var(--bg4);border:1.5px solid var(--border2);border-radius:12px;padding:16px 50px 16px 20px;font-size:24px;font-family:'Unbounded',sans-serif;font-weight:600;color:var(--text);outline:none;transition:border-color .2s}
.amount-input:focus{border-color:var(--accent)}
.amount-input::placeholder{color:var(--text3)}
.currency-label{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);font-weight:500}
.note-input{width:100%;background:var(--bg4);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px}
.note-input:focus{border-color:var(--accent)}
.note-input::placeholder{color:var(--text3)}

/* CATEGORIES */
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.cat-btn.active{border-color:var(--accent);background:var(--blue-bg);color:var(--accent2)}
.add-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.add-btn:active{opacity:.85}

/* EXPENSE LIST */
.exp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border-bottom:none}
.exp-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-note{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:11px;color:var(--text3);margin-top:2px}
.exp-amount{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:var(--red);flex-shrink:0}
.exp-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;font-size:16px;opacity:0;transition:opacity .2s}
.exp-item:hover .exp-del{opacity:1}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px}
.cal-month{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .15s;border:1.5px solid transparent}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.today{border-color:var(--accent)}
.cal-day.green{background:var(--green-bg);border-color:var(--green-border)}
.cal-day.yellow{background:var(--yellow-bg);border-color:var(--yellow-border)}
.cal-day.red{background:var(--red-bg);border-color:var(--red-border)}
.cal-day.future{background:var(--bg3);opacity:.5}
.cal-day.no-data{background:var(--bg3)}
.cal-num{font-size:13px;font-weight:600;color:var(--text)}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px}
.cal-day.green .cal-dot{background:var(--green)}
.cal-day.yellow .cal-dot{background:var(--yellow)}
.cal-day.red .cal-dot{background:var(--red)}

/* SAVINGS */
.savings-hero{background:linear-gradient(135deg,#059669,#047857);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}
.savings-amount{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:700;color:#fff;margin:8px 0 4px}
.savings-lbl{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.5px}

/* SETTINGS */
.settings-group{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500;color:var(--text)}
.settings-sub{font-size:11px;color:var(--text3);margin-top:2px}
.settings-val{font-size:14px;font-weight:600;color:var(--accent2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--sb))}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.form-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:12px 14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.modal-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px}
.modal-btn-primary{background:var(--accent);color:#fff}
.modal-btn-secondary{background:var(--bg3);color:var(--text2);margin-top:8px}

/* FEEDBACK */
.feedback{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px}
.feedback.green{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.feedback.yellow{background:var(--yellow-bg);border:1px solid var(--yellow-border);color:var(--yellow)}
.feedback.red{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:36px;opacity:.3;margin-bottom:10px}
.empty-text{font-size:14px;color:var(--text3)}

/* MISC */
.btn-row{display:flex;gap:8px}
.btn-sm{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.section-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:16px 0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">💰 Бюджет</div>
    <div class="topbar-sub" id="topbar-month"></div>
  </div>
  <div class="sync-badge">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">...</span>
  </div>
</div>

<div id="page-home" class="page active content"></div>
<div id="page-calendar" class="page content"></div>
<div id="page-savings" class="page content"></div>
<div id="page-settings" class="page content"></div>

<nav class="bnav">
  <button class="bnav-btn active" onclick="goTo('home')" id="nav-home"><span class="bnav-icon">🏠</span><span class="bnav-label">Басты</span></button>
  <button class="bnav-btn" onclick="goTo('calendar')" id="nav-calendar"><span class="bnav-icon">📅</span><span class="bnav-label">Күнтізбе</span></button>
  <button class="bnav-btn" onclick="goTo('savings')" id="nav-savings"><span class="bnav-icon">🐖</span><span class="bnav-label">Жинақ</span></button>
  <button class="bnav-btn" onclick="goTo('settings')" id="nav-settings"><span class="bnav-icon">⚙️</span><span class="bnav-label">Баптау</span></button>
</nav>

<div class="modal-overlay hidden" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── SUPABASE ─────────────────────────────────────────────────────
const SUPA_URL = 'https://tcpvxvgexmsazmzcihjy.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjcHZ4dmdleG1zYXptemNpaGp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIyNDIsImV4cCI6MjA5MDY5ODI0Mn0.2yZ1GWtcWHamgbkfXnOpag8P60JmP6TgOvUAto7VuJ8';
const H = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(table, qs='') {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?select=*'+qs,{headers:H});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table,{method:'POST',headers:H,body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, data) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, id) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:H});
  if(!r.ok) throw new Error(await r.text());
}

// ── STATE ────────────────────────────────────────────────────────
let budget = null;       // {id, month, total_amount}
let expenses = [];       // [{id, amount, category, note, date}]
let savings = [];        // [{id, amount, note, date}]
let currentTab = 'home';
let selectedCat = 'food';
let calMonth = new Date();
calMonth.setDate(1);

const CATS = [
  {id:'food',   icon:'🍔', label:'Тамақ'},
  {id:'taxi',   icon:'🚕', label:'Такси'},
  {id:'cafe',   icon:'☕', label:'Кафе'},
  {id:'shop',   icon:'🛍', label:'Дүкен'},
  {id:'health', icon:'💊', label:'Дәрі'},
  {id:'fun',    icon:'🎮', label:'Ойын-сауық'},
  {id:'other',  icon:'📦', label:'Басқа'},
];
function catById(id) { return CATS.find(c=>c.id===id)||CATS[CATS.length-1]; }

// ── HELPERS ──────────────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString('ru'); }
function today() { return new Date().toISOString().slice(0,10); }
function monthKey() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function daysRemaining() {
  const now = new Date();
  const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
  return last.getDate() - now.getDate() + 1;
}
function totalDays() {
  const now = new Date();
  return daysInMonth(now.getFullYear(), now.getMonth());
}

function setSyncStatus(ok) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(dot) dot.className = 'sync-dot'+(ok?' ok':'');
  if(lbl) lbl.textContent = ok ? 'Синхрондалды' : 'Офлайн';
}

// ── BUDGET CALC ──────────────────────────────────────────────────
function totalSpentThisMonth() {
  const m = monthKey();
  return expenses.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+Number(e.amount),0);
}
function totalSpentToday() {
  return expenses.filter(e=>e.date===today()).reduce((s,e)=>s+Number(e.amount),0);
}
function totalSavings() {
  return savings.reduce((s,sv)=>s+Number(sv.amount),0);
}
function dailyLimit() {
  if(!budget) return 0;
  const total = Number(budget.total_amount);
  const spent = totalSpentThisMonth();
  const remaining = total - spent;
  const days = daysRemaining();
  return days > 0 ? remaining / days : 0;
}
function spentByDay(dateStr) {
  return expenses.filter(e=>e.date===dateStr).reduce((s,e)=>s+Number(e.amount),0);
}
function baseDailyLimit() {
  if(!budget) return 0;
  return Number(budget.total_amount) / totalDays();
}
function dayStatus(spent, limit) {
  if(spent === 0 && limit === 0) return 'no-data';
  const ratio = spent / limit;
  if(ratio >= 1) return 'red';
  if(ratio >= 0.8) return 'yellow';
  return 'green';
}
function feedbackMsg() {
  const limit = dailyLimit();
  const spent = totalSpentToday();
  if(!budget) return null;
  if(spent === 0) return {type:'green', msg:'🌅 Бүгін әлі шығын жоқ. Жақсы күн болсын!'};
  if(spent > limit) return {type:'red', msg:'⚠️ Күндік лимиттен асып кеттіңіз. Ертең бюджет азаяды.'};
  const ratio = spent/limit;
  if(ratio >= 0.8) return {type:'yellow', msg:'⚡ Күндік лимитке жақындап қалдыңыз.'};
  return {type:'green', msg:'✅ Бүгін бюджет аясында жүрсіз. Тамаша!'};
}

// ── NAVIGATION ───────────────────────────────────────────────────
function goTo(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  render();
}

// ── MODAL ─────────────────────────────────────────────────────────
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}
function showModal(html) {
  document.getElementById('modal-content').innerHTML = '<div class="modal-handle"></div>'+html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const now = new Date();
  const months = ['Қаңтар','Ақпан','Наурыз','Сәуір','Мамыр','Маусым','Шілде','Тамыз','Қыркүйек','Қазан','Қараша','Желтоқсан'];
  document.getElementById('topbar-month').textContent = months[now.getMonth()]+' '+now.getFullYear();

  if(currentTab==='home') renderHome();
  else if(currentTab==='calendar') renderCalendar();
  else if(currentTab==='savings') renderSavings();
  else if(currentTab==='settings') renderSettings();
}

function renderHome() {
  const limit = dailyLimit();
  const spentToday = totalSpentToday();
  const spentMonth = totalSpentThisMonth();
  const totalBudget = budget ? Number(budget.total_amount) : 0;
  const remaining = totalBudget - spentMonth;
  const progress = totalBudget > 0 ? Math.min(spentMonth/totalBudget*100, 100) : 0;
  const status = dayStatus(spentToday, limit);
  const fb = feedbackMsg();
  const todayExpenses = expenses.filter(e=>e.date===today()).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  if(!budget) {
    document.getElementById('page-home').innerHTML = `
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">💰</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;margin-bottom:8px">Бюджетті орнатыңыз</div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:24px">Ай сайынғы бюджетті енгізіп, күнделікті шығындарды бақылаңыз</div>
      <button class="add-btn" style="max-width:240px;margin:0 auto" onclick="openBudgetModal()">Бюджет орнату</button>
    </div>`;
    return;
  }

  let html = '';

  // Hero
  html += `<div class="hero">
    <div class="hero-label">Ай бюджеті</div>
    <div class="hero-amount">${fmt(totalBudget)} ₸</div>
    <div class="hero-sub">Қалған: ${fmt(remaining)} ₸ · ${daysRemaining()} күн</div>
    <div class="hero-progress">
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-labels"><span>Жұмсалды: ${fmt(spentMonth)} ₸</span><span>${Math.round(progress)}%</span></div>
    </div>
  </div>`;

  // Feedback
  if(fb) html += `<div class="feedback ${fb.type}">${fb.msg}</div>`;

  // Today limit
  html += `<div class="day-box ${status}">
    <div class="day-title">Бүгінгі лимит</div>
    <div class="day-amount">${fmt(limit)} ₸</div>
    <div class="day-sub">Бүгін жұмсалды: ${fmt(spentToday)} ₸${spentToday>limit?' · <span style="color:var(--red)">Асып кетті!</span>':''}</div>
  </div>`;

  // Stats
  html += `<div class="stat-row">
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${fmt(spentToday)}</div><div class="stat-lbl">Бүгін ₸</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--accent2)">${fmt(limit)}</div><div class="stat-lbl">Лимит ₸</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${fmt(Math.max(0,limit-spentToday))}</div><div class="stat-lbl">Қалды ₸</div></div>
  </div>`;

  // Quick add
  const catsHtml = CATS.map(c=>`<button class="cat-btn ${selectedCat===c.id?'active':''}" onclick="selectedCat='${c.id}';renderHome()">${c.icon} ${c.label}</button>`).join('');
  html += `<div class="quick-add">
    <div class="quick-add-title">Шығын қосу</div>
    <div class="amount-input-wrap">
      <input class="amount-input" id="exp-amount" type="number" inputmode="numeric" placeholder="0" />
      <span class="currency-label">₸</span>
    </div>
    <input class="note-input" id="exp-note" placeholder="Не үшін? (міндетті емес)" />
    <div class="cats">${catsHtml}</div>
    <button class="add-btn" onclick="addExpense()">➕ Қосу</button>
  </div>`;

  // Today expenses
  html += `<div class="card">
    <div class="card-title">Бүгінгі шығындар</div>`;
  if(!todayExpenses.length) {
    html += `<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">Бүгін шығын жоқ</div></div>`;
  } else {
    todayExpenses.forEach(e=>{
      const c = catById(e.category);
      html += `<div class="exp-item">
        <div class="exp-icon" style="background:var(--bg4)">${c.icon}</div>
        <div class="exp-info">
          <div class="exp-note">${e.note||c.label}</div>
          <div class="exp-meta">${c.label} · ${new Date(e.created_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="exp-amount">-${fmt(e.amount)} ₸</div>
        <button class="exp-del" onclick="deleteExpense('${e.id}')">🗑</button>
      </div>`;
    });
  }
  html += `</div>`;

  document.getElementById('page-home').innerHTML = html;
}

function renderCalendar() {
  const y = calMonth.getFullYear();
  const m = calMonth.getMonth();
  const months = ['Қаңтар','Ақпан','Наурыз','Сәуір','Мамыр','Маусым','Шілде','Тамыз','Қыркүйек','Қазан','Қараша','Желтоқсан'];
  const days = daysInMonth(y,m);
  const firstDow = new Date(y,m,1).getDay();
  const offset = (firstDow+6)%7;
  const base = baseDailyLimit();
  const todayStr = today();

  let html = `<div class="cal-header">
    <button class="cal-nav" onclick="calMonth.setMonth(calMonth.getMonth()-1);renderCalendar()">‹</button>
    <div class="cal-month">${months[m]} ${y}</div>
    <button class="cal-nav" onclick="calMonth.setMonth(calMonth.getMonth()+1);renderCalendar()">›</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow">Дс</div><div class="cal-dow">Сс</div><div class="cal-dow">Ср</div>
    <div class="cal-dow">Бс</div><div class="cal-dow">Жм</div><div class="cal-dow">Сб</div><div class="cal-dow">Жк</div>`;

  for(let i=0;i<offset;i++) html+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=days;d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = dateStr > todayStr;
    const isToday = dateStr === todayStr;
    const spent = spentByDay(dateStr);
    let cls = isFuture ? 'future' : (spent===0 ? 'no-data' : dayStatus(spent, base));
    if(isToday) cls += ' today';
    html += `<div class="cal-day ${cls}" onclick="showDayDetail('${dateStr}')">
      <span class="cal-num">${d}</span>
      ${!isFuture && spent>0?`<span class="cal-dot"></span>`:''}
    </div>`;
  }
  html += `</div>`;

  // Legend
  html += `<div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:3px;background:var(--green-bg);border:1px solid var(--green-border)"></div>Аз жұмсалды</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:3px;background:var(--yellow-bg);border:1px solid var(--yellow-border)"></div>Лимитке жақын</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)"><div style="width:10px;height:10px;border-radius:3px;background:var(--red-bg);border:1px solid var(--red-border)"></div>Асып кетті</div>
  </div>`;

  // Monthly summary
  const mKey = `${y}-${String(m+1).padStart(2,'0')}`;
  const mExpenses = expenses.filter(e=>e.date.startsWith(mKey));
  const mTotal = mExpenses.reduce((s,e)=>s+Number(e.amount),0);

  // Category breakdown
  const catTotals = {};
  mExpenses.forEach(e=>{ catTotals[e.category]=(catTotals[e.category]||0)+Number(e.amount); });
  const topCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,5);

  html += `<div class="card" style="margin-top:16px">
    <div class="card-title">Ай қорытындысы</div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:14px">
      <span style="color:var(--text2)">Барлық шығын</span>
      <span style="font-weight:600;color:var(--red)">${fmt(mTotal)} ₸</span>
    </div>`;
  if(topCats.length) {
    const maxV = topCats[0][1];
    topCats.forEach(([cid,val])=>{
      const c = catById(cid);
      html+=`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span>${c.icon} ${c.label}</span><span style="color:var(--text2)">${fmt(val)} ₸</span>
        </div>
        <div style="height:4px;background:var(--bg3);border-radius:2px">
          <div style="height:100%;width:${Math.round(val/maxV*100)}%;background:var(--accent);border-radius:2px"></div>
        </div>
      </div>`;
    });
  }
  html += `</div>`;

  document.getElementById('page-calendar').innerHTML = html;
}

function renderSavings() {
  const total = totalSavings();
  const recentSavings = [...savings].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,20);

  let html = `<div class="savings-hero">
    <div class="savings-lbl">Жинақ қоры</div>
    <div class="savings-amount">${fmt(total)} ₸</div>
    <div style="font-size:12px;color:rgba(255,255,255,.6)">${savings.length} жазба</div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn-sm btn-primary" style="flex:1" onclick="openSavingsModal()">➕ Жинаққа қосу</button>
    <button class="btn-sm btn-ghost" style="flex:1" onclick="openWithdrawModal()">💸 Алу</button>
  </div>

  <div class="card">
    <div class="card-title">Тарих</div>`;

  if(!recentSavings.length) {
    html += `<div class="empty"><div class="empty-icon">🐖</div><div class="empty-text">Жинақ жоқ</div></div>`;
  } else {
    recentSavings.forEach(s=>{
      const isWithdraw = s.amount < 0;
      html += `<div class="exp-item">
        <div class="exp-icon" style="background:var(--bg4)">${isWithdraw?'💸':'💰'}</div>
        <div class="exp-info">
          <div class="exp-note">${s.note||(isWithdraw?'Алынды':'Жинақталды')}</div>
          <div class="exp-meta">${new Date(s.date).toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'})}</div>
        </div>
        <div class="exp-amount" style="color:${isWithdraw?'var(--red)':'var(--green)'}">${isWithdraw?'':'+'}${fmt(s.amount)} ₸</div>
        <button class="exp-del" onclick="deleteSaving('${s.id}')">🗑</button>
      </div>`;
    });
  }
  html += `</div>`;

  document.getElementById('page-savings').innerHTML = html;
}

  const totalBudget = budget ? Number(budget.total_amount) : 0;
  const base = baseDailyLimit();

  let html = `<h2 style="font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;margin-bottom:20px">Баптаулар</h2>

  <div class="settings-group">
    <div class="settings-item">
      <div><div class="settings-label">Ай бюджеті</div><div class="settings-sub">Ағымдағы ай</div></div>
      <div class="settings-val">${fmt(totalBudget)} ₸</div>
    </div>
    <div class="settings-item">
      <div><div class="settings-label">Күнделікті лимит</div><div class="settings-sub">Базалық мән</div></div>
      <div class="settings-val">${fmt(base)} ₸</div>
    </div>
    <div class="settings-item">
      <div><div class="settings-label">Қалған күндер</div><div class="settings-sub">Ай соңына дейін</div></div>
      <div class="settings-val">${daysRemaining()} күн</div>
    </div>
  </div>

  <button class="modal-btn modal-btn-primary" onclick="openBudgetModal()">✏️ Бюджетті өзгерту</button>

  <div class="divider"></div>

  <div class="section-title">Деректер</div>
  <div class="settings-group">
    <div class="settings-item" onclick="exportData()" style="cursor:pointer">
      <div><div class="settings-label">Деректерді жүктеу</div><div class="settings-sub">JSON форматында</div></div>
      <span style="color:var(--text3)">›</span>
    </div>
    <div class="settings-item" onclick="if(confirm('Барлық деректерді өшіресіз бе?'))clearAllData()" style="cursor:pointer">
      <div><div class="settings-label" style="color:var(--red)">Барлығын тазалау</div><div class="settings-sub">Қайтарылмайды!</div></div>
      <span style="color:var(--text3)">›</span>
    </div>
  </div>`;

  document.getElementById('page-settings').innerHTML = html;

// ── MODALS ────────────────────────────────────────────────────────
function openBudgetModal() {
  const cur = budget ? Number(budget.total_amount) : '';
  showModal(`
  <div class="modal-title">Ай бюджетін орнату</div>
  <div class="form-group">
    <label class="form-label">Ай бюджеті (₸)</label>
    <input class="form-input" id="budget-input" type="number" inputmode="numeric" placeholder="150000" value="${cur}" style="font-size:20px;font-family:'Unbounded',sans-serif;font-weight:600"/>
  </div>
  <p style="font-size:12px;color:var(--text3);margin-bottom:4px">Күнделікті лимит автоматты есептеледі</p>
  <button class="modal-btn modal-btn-primary" onclick="saveBudget()">💾 Сақтау</button>
  <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Болдырмау</button>`);
}

async function saveBudget() {
  const val = parseFloat(document.getElementById('budget-input').value);
  if(!val||val<=0) return alert('Сомасын енгізіңіз');
  const m = monthKey();
  try {
    if(budget) {
      await sbUpdate('budgets', budget.id, {total_amount: val});
      budget.total_amount = val;
    } else {
      const res = await sbInsert('budgets', {month: m, total_amount: val});
      budget = res[0];
    }
    setSyncStatus(true);
    closeModal();
    render();
  } catch(e) {
    setSyncStatus(false);
    alert('Қате: '+e.message);
  }
}

function openSavingsModal() {
  showModal(`
  <div class="modal-title">Жинаққа қосу</div>
  <div class="form-group">
    <label class="form-label">Сомасы (₸)</label>
    <input class="form-input" id="saving-amount" type="number" inputmode="numeric" placeholder="10000" style="font-size:20px"/>
  </div>
  <div class="form-group">
    <label class="form-label">Ескертпе</label>
    <input class="form-input" id="saving-note" type="text" placeholder="Мысалы: Ноутбукке"/>
  </div>
  <button class="modal-btn modal-btn-primary" onclick="addSaving(1)">💰 Жинаққа салу</button>
  <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Болдырмау</button>`);
}

function openWithdrawModal() {
  showModal(`
  <div class="modal-title">Жинақтан алу</div>
  <div class="form-group">
    <label class="form-label">Сомасы (₸)</label>
    <input class="form-input" id="saving-amount" type="number" inputmode="numeric" placeholder="5000" style="font-size:20px"/>
  </div>
  <div class="form-group">
    <label class="form-label">Ескертпе</label>
    <input class="form-input" id="saving-note" type="text" placeholder="Не үшін алынды"/>
  </div>
  <button class="modal-btn" style="background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px" onclick="addSaving(-1)">💸 Алу</button>
  <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Болдырмау</button>`);
}

async function addSaving(sign) {
  const amt = parseFloat(document.getElementById('saving-amount').value);
  const note = document.getElementById('saving-note').value;
  if(!amt||amt<=0) return alert('Сомасын енгізіңіз');
  try {
    const res = await sbInsert('savings', {amount: amt*sign, note, date: today()});
    savings.push(res[0]);
    setSyncStatus(true);
    closeModal();
    render();
  } catch(e) {
    setSyncStatus(false);
    alert('Қате: '+e.message);
  }
}

function showDayDetail(dateStr) {
  const dayExp = expenses.filter(e=>e.date===dateStr).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const total = dayExp.reduce((s,e)=>s+Number(e.amount),0);
  const d = new Date(dateStr);
  const dateLabel = d.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});
  const base = baseDailyLimit();
  const st = dayStatus(total, base);
  const stColors = {green:'var(--green)',yellow:'var(--yellow)',red:'var(--red)','no-data':'var(--text3)'};

  let expsHtml = dayExp.length ? dayExp.map(e=>{
    const c=catById(e.category);
    return `<div class="exp-item">
      <div class="exp-icon" style="background:var(--bg4)">${c.icon}</div>
      <div class="exp-info"><div class="exp-note">${e.note||c.label}</div><div class="exp-meta">${c.label}</div></div>
      <div class="exp-amount">-${fmt(e.amount)} ₸</div>
    </div>`;
  }).join('') : `<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">Бұл күні шығын жоқ</div></div>`;

  showModal(`
  <div class="modal-title">${dateLabel}</div>
  <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:12px;padding:14px 16px;margin-bottom:16px">
    <span style="color:var(--text2);font-size:13px">Барлық шығын</span>
    <span style="font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600;color:${stColors[st]||'var(--text)'}">${fmt(total)} ₸</span>
  </div>
  ${expsHtml}
  <button class="modal-btn modal-btn-secondary" onclick="closeModal()" style="margin-top:12px">Жабу</button>`);
}

// ── EXPENSE ACTIONS ───────────────────────────────────────────────
async function addExpense() {
  const amtEl = document.getElementById('exp-amount');
  const noteEl = document.getElementById('exp-note');
  const amt = parseFloat(amtEl.value);
  if(!amt||amt<=0) { amtEl.focus(); return; }
  const note = noteEl.value.trim();
  try {
    const res = await sbInsert('expenses', {amount:amt, category:selectedCat, note, date:today()});
    expenses.push(res[0]);
    amtEl.value=''; noteEl.value='';
    setSyncStatus(true);
    render();
  } catch(e) {
    setSyncStatus(false);
    alert('Қате: '+e.message);
  }
}

async function deleteExpense(id) {
  if(!confirm('Жойылсын ба?')) return;
  try {
    await sbDelete('expenses', id);
    expenses = expenses.filter(e=>e.id!==id);
    setSyncStatus(true);
    render();
  } catch(e) {
    setSyncStatus(false);
  }
}

async function deleteSaving(id) {
  if(!confirm('Жойылсын ба?')) return;
  try {
    await sbDelete('savings', id);
    savings = savings.filter(s=>s.id!==id);
    setSyncStatus(true);
    render();
  } catch(e) {
    setSyncStatus(false);
  }
}

// ── SETTINGS ACTIONS ──────────────────────────────────────────────
function exportData() {
  const data = {budget, expenses, savings, exported: new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'budget-export-'+today()+'.json';
  a.click();
}

async function clearAllData() {
  try {
    for(const e of expenses) await sbDelete('expenses', e.id);
    for(const s of savings) await sbDelete('savings', s.id);
    expenses=[]; savings=[];
    setSyncStatus(true);
    render();
  } catch(e) { setSyncStatus(false); }
}

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  setSyncStatus(false);
  try {
    const m = monthKey();
    const [bRes, eRes, sRes] = await Promise.all([
      sbGet('budgets', '&month=eq.'+m),
      sbGet('expenses', '&order=created_at.desc'),
      sbGet('savings', '&order=created_at.desc'),
    ]);
    budget = bRes[0] || null;
    expenses = eRes;
    savings = sRes;
    setSyncStatus(true);
  } catch(e) {
    setSyncStatus(false);
    console.error(e);
  }
  render();
}

init();
</script>
</body>
</html>
